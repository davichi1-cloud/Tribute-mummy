<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tributes</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Georgia, serif;
    margin:0;
}

nav{
    background:#000;
    padding:20px;
    text-align:center;
}

nav a{
    color:#d4af37;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:40px 0;
}

.page-title{
    text-align:center;
    color:#d4af37;
    margin-bottom:30px;
}

.form-box{
    background:#1a1a1a;
    padding:25px;
    border-radius:10px;
    margin-bottom:40px;
}

.form-box input,
.form-box textarea{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:20px;
    border:none;
    border-radius:5px;
    background:#2a2a2a;
    color:white;
    font-size:16px;
}

.form-box textarea{
    height:150px;
    resize:none;
}

.form-box button{
    background:#d4af37;
    color:black;
    border:none;
    padding:15px 25px;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
}

.form-box button:hover{
    opacity:.9;
}

.tribute-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.tribute-card{
    background:#1a1a1a;
    padding:20px;
    border-radius:10px;
    border-left:5px solid #d4af37;
}

.tribute-card h3{
    color:#d4af37;
    margin-bottom:10px;
}

.loading{
    text-align:center;
    color:#ccc;
}

</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="life-story.html">Life Story</a>
    <a href="gallery.html">Gallery</a>
    <a href="tribute.html">Tributes</a>
</nav>

<div class="container">

<h1 class="page-title">Tributes</h1>

<div class="form-box">

<h2>Leave a Tribute</h2>

<input
type="text"
id="name"
placeholder="Your Name">

<textarea
id="message"
placeholder="Write your tribute here..."></textarea>

<button onclick="submitTribute()">
Submit Tribute
</button>

</div>

<h2>Recent Tributes</h2>

<div
id="tributeList"
class="tribute-list">

<p class="loading">Loading tributes...</p>

</div>

</div>

<script src="js/tribute.js"></script>

</body>
</html>
